<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doors to Manual</title>

    <!-- Jam widget (required for Cursor Vibe Jam 2026) -->
    <script async src="https://vibej.am/2026/widget.js"></script>

    <!-- Pixel font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <!-- Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Press Start 2P", monospace;
      }

      #game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* HUD bars — DOM elements, sit above/below canvas */
      .hud {
        width: 800px;
        background: #1b2a4a;
        font-size: 11px;
        color: #fff;
        padding: 11px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        letter-spacing: 0.05em;
        flex-shrink: 0;
      }
      .hud--top {
        border-bottom: 2px solid #000;
      }
      .hud--bottom {
        border-top: 2px solid #000;
        justify-content: center;
        gap: 40px;
      }
      .hud__armed {
        color: #ff4444;
      }
      .hud__route {
        color: #ffffff;
      }
      .hud__timer {
        color: #ffff44;
      }
      .hud__score {
        color: #00ff7f;
      }
      .hud__phase {
        color: #aaaaaa;
      }

      /* Phaser mounts its canvas here */
      #game-container canvas {
        display: block !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border-left: 3px solid #111;
        border-right: 3px solid #111;
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <header class="hud hud--top">
        <span class="hud__armed">DOORS TO ARMED</span>
        <span class="hud__route">SIN → KUL</span>
        <span class="hud__timer" id="hud-timer">04:00</span>
      </header>

      <div id="game-container"></div>

      <footer class="hud hud--bottom">
        <span class="hud__score" id="hud-score">SCORE: 0</span>
        <span class="hud__phase" id="hud-phase">PHASE: BOARDING</span>
      </footer>
    </div>
    <script>
      // =============================================================================
      // DOORS TO MANUAL — Cabin Scene (Phaser.js 3)
      // Engine: Phaser 3 | Canvas: 800×(grid + thin margin) | Portrait
      // =============================================================================

      // ---------------------------------------------------------------------------
      // CONSTANTS — grid geometry (matches vanilla JS version for continuity)
      // ---------------------------------------------------------------------------
      const CW = 800;
      const TILE = 48;

      // Grid: 9 cols × 12 rows = 432×576px
      // Layout: 3 left seats | 1 aisle | 3 right seats | 2 fuselage walls
      const GRID_COLS = 9,
        GRID_ROWS = 12;
      const GRID_W = GRID_COLS * TILE; // 432
      const GRID_H = GRID_ROWS * TILE; // 576
      // Snug canvas height — only a small margin above/below the grid (avoids large black bands in-canvas)
      const CANVAS_V_MARGIN = 8;
      const CH = GRID_H + CANVAS_V_MARGIN * 2;
      const OX = Math.floor((CW - GRID_W) / 2);
      const OY = CANVAS_V_MARGIN;

      // Tile row indices (top → bottom)
      const TR = {
        fuseTop: 0, // fuselage top wall
        galley: 1, // galley zone (TOP — player spawns here)
        cabin: 2, // first cabin row (row 1); rows 2–8 follow sequentially
        cockpit: 10, // cockpit door (BOTTOM)
        fuseBot: 11, // fuselage bottom wall
      };

      // Tile col indices (left → right)
      const TC = {
        fuseLeft: 0, // fuselage left wall
        seatA: 1, // left window seat
        seatB: 2, // left middle seat
        seatC: 3, // left aisle seat
        aisle: 4, // centre aisle
        seatD: 5, // right aisle seat
        seatE: 6, // right middle seat
        seatF: 7, // right window seat
        fuseRight: 8, // fuselage right wall
      };

      const SEAT_COLS_LEFT = [TC.seatA, TC.seatB, TC.seatC];
      const SEAT_COLS_RIGHT = [TC.seatD, TC.seatE, TC.seatF];
      const CABIN_ROWS = 8; // rows 1 through 8

      // ---------------------------------------------------------------------------
      // COLOURS
      // ---------------------------------------------------------------------------
      const C = {
        bg: 0x111111,
        fuselage: 0xe8e4dc,
        fuseEdge: 0xc4c0b8,
        window: 0x4a7aaa,
        windowGlare: 0x7aaad0,
        cabinFloor: 0xf5f0e8,
        seatNavy: 0x1b2a4a,
        seatHi: 0x2a3f6b,
        aisle: 0xd0cec8,
        aisleStripe: 0xbcbab4,
        divider: 0xe0dbd0,
        cockpitFill: 0x0f1a2e,
        cockpitAccent: 0x1b2a4a,
        galleyFill: 0xbbbbbb,
        galleyUnit: 0x999999,
        galleyTop: 0xaaaaaa,
        // Passenger variants (muted so crew pops)
        paxSkins: [0xd4a882, 0xc8956a, 0xe8c9a0, 0xb07850],
        paxBodies: [0x8a8fa0, 0x7a8a70, 0x9a8878, 0x707890],
        paxHairs: [0x2a2018, 0x111111, 0x503820, 0x182018],
        // Crew
        crewBody: 0x00ff7f,
        crewSkin: 0xf5c5a0,
        crewHair: 0x111111,
        crewAccent: 0xffd700,
      };

      // ---------------------------------------------------------------------------
      // SEEDED PRNG — consistent layout each session
      // ---------------------------------------------------------------------------
      let _s = 7331;
      function rand() {
        _s = (_s * 1664525 + 1013904223) >>> 0;
        return _s / 0xffffffff;
      }
      function ri(a, b) {
        return a + Math.floor(rand() * (b - a + 1));
      }

      // ---------------------------------------------------------------------------
      // PASSENGER MAP — random 3–5 occupied seats per cabin row
      // ---------------------------------------------------------------------------
      const paxMap = {};
      for (let rowNum = 1; rowNum <= CABIN_ROWS; rowNum++) {
        const total = ri(3, 5);
        const indices = [0, 1, 2, 3, 4, 5];
        for (let i = 5; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const occupied = new Set(indices.slice(0, total));
        paxMap[rowNum] = Array.from({ length: 6 }, (_, s) => ({
          occ: occupied.has(s),
          v: ri(0, 3),
        }));
      }

      // ---------------------------------------------------------------------------
      // HELPER — pixel coordinate from tile col/row
      // ---------------------------------------------------------------------------
      function tx(col) {
        return OX + col * TILE;
      }
      function ty(row) {
        return OY + row * TILE;
      }

      // =============================================================================
      // PHASER SCENE — CharacterSelectScene (crew gender before cabin)
      // =============================================================================
      class CharacterSelectScene extends Phaser.Scene {
        constructor() {
          super({ key: "CharacterSelectScene" });
        }

        preload() {
          // Only the south-facing previews needed for this screen; cabin loads the rest.
          this.load.image(
            "female-crew-south",
            "sprites/female-crew-south.png",
          );
          this.load.image("male-crew-south", "sprites/male-crew-south.png");
        }

        create() {
          this.add.rectangle(CW / 2, CH / 2, CW, CH, 0x000000);

          // Shared vertical rhythm: same gap above boxes (under subtitle) and below labels (above hint)
          const rowGap = 20;

          // Title block — positions scale with canvas height (CH matches cabin scene)
          const title1Y = Math.round(CH * 0.14);
          const title2Y = title1Y + 44;
          this.add
            .text(CW / 2, title1Y, "DOORS TO MANUAL", {
              fontFamily: '"Press Start 2P"',
              fontSize: "20px",
              color: "#00FF7F",
            })
            .setOrigin(0.5);
          this.add
            .text(CW / 2, title2Y, "SELECT YOUR CREW", {
              fontFamily: '"Press Start 2P"',
              fontSize: "13px",
              color: "#FFFFFF",
              stroke: "#000000",
              strokeThickness: 3,
            })
            .setOrigin(0.5);

          // Subtitle uses default origin (0.5, 0.5): bottom edge ≈ centre + half line height
          const subtitleLineHalf = 14;
          const subtitleBottom = title2Y + subtitleLineHalf;

          // Option layout: larger boxes + crew previews for the taller portrait canvas
          const boxW = 108;
          const boxH = 152;
          const gap = 96;
          const totalW = boxW + gap + boxW;
          const leftCx = CW / 2 - totalW / 2 + boxW / 2;
          const rightCx = CW / 2 + totalW / 2 - boxW / 2;
          const boxTopY = subtitleBottom + rowGap * 2;
          const crewPreviewSize = Math.min(96, boxH - 28);

          let selected = "female"; // default highlight (matches green border)

          const drawBox = (g, x, y, highlighted) => {
            g.clear();
            const r = 6;
            g.fillStyle(0x0f1a2e, 1);
            g.fillRoundedRect(x - boxW / 2, y, boxW, boxH, r);
            g.lineStyle(
              2,
              highlighted ? 0x00ff7f : 0x1b2a4a,
              1,
            );
            g.strokeRoundedRect(x - boxW / 2, y, boxW, boxH, r);
          };

          const leftG = this.add.graphics();
          const rightG = this.add.graphics();

          const refreshBorders = () => {
            drawBox(leftG, leftCx, boxTopY, selected === "female");
            drawBox(rightG, rightCx, boxTopY, selected === "male");
          };
          refreshBorders();

          const leftSprite = this.add
            .image(leftCx, boxTopY + boxH / 2, "female-crew-south")
            .setDisplaySize(crewPreviewSize, crewPreviewSize);
          const rightSprite = this.add
            .image(rightCx, boxTopY + boxH / 2, "male-crew-south")
            .setDisplaySize(crewPreviewSize, crewPreviewSize);

          this.add
            .text(leftCx, boxTopY + boxH + 12, "FEMALE", {
              fontFamily: '"Press Start 2P"',
              fontSize: "11px",
              color: "#FFFFFF",
              stroke: "#000000",
              strokeThickness: 3,
            })
            .setOrigin(0.5, 0);
          this.add
            .text(rightCx, boxTopY + boxH + 12, "MALE", {
              fontFamily: '"Press Start 2P"',
              fontSize: "11px",
              color: "#FFFFFF",
              stroke: "#000000",
              strokeThickness: 3,
            })
            .setOrigin(0.5, 0);

          const hitPad = 10;
          const makeZone = (cx, key) => {
            const z = this.add
              .zone(
                cx,
                boxTopY + boxH / 2,
                boxW + hitPad * 2,
                boxH + 52 + hitPad,
              )
              .setOrigin(0.5, 0.5)
              .setInteractive({ useHandCursor: true });
            z.on("pointerover", () => {
              selected = key;
              refreshBorders();
            });
            z.on("pointerdown", () => {
              window.selectedCrew = key;
              this.scene.start("CabinScene");
            });
            return z;
          };
          makeZone(leftCx, "female");
          makeZone(rightCx, "male");

          // “CLICK TO START” — same size as subtitle; gap under FEMALE/MALE = rowGap * 2 (matches subtitle→boxes)
          const labelTopY = boxTopY + boxH + 12;
          const labelApproxH = 18; // ~11px PS2P line + stroke
          const hintTopY = labelTopY + labelApproxH + rowGap * 2;

          const hint = this.add
            .text(CW / 2, hintTopY, "CLICK TO START", {
              fontFamily: '"Press Start 2P"',
              fontSize: "13px",
              color: "#bbbbbb",
              stroke: "#222222",
              strokeThickness: 2,
            })
            .setOrigin(0.5, 0);
          this.tweens.add({
            targets: hint,
            alpha: { from: 1, to: 0.35 },
            duration: 300,
            yoyo: true,
            repeat: -1,
          });
        }
      }

      // =============================================================================
      // PHASER SCENE — CabinScene
      // =============================================================================
      class CabinScene extends Phaser.Scene {
        constructor() {
          super({ key: "CabinScene" });
        }

        // ---------------------------------------------------------------------------
        // PRELOAD — PNG sprites + programmatic cabin tiles (Graphics)
        // ---------------------------------------------------------------------------
        preload() {
          const crew = ["south", "north", "east", "west"];
          crew.forEach((dir) => {
            this.load.image(
              `female-crew-${dir}`,
              `sprites/female-crew-${dir}.png`,
            );
            this.load.image(
              `male-crew-${dir}`,
              `sprites/male-crew-${dir}.png`,
            );
          });
          for (let v = 0; v < 4; v++) {
            crew.forEach((dir) => {
              this.load.image(
                `pax-${v}-${dir}`,
                `sprites/pax-${v}-${dir}.png`,
              );
            });
          }
          this.generateTextures();
        }

        generateTextures() {
          const g = this.make.graphics({ x: 0, y: 0, add: false });

          // --- Fuselage top/bottom wall tile (32×32) ---
          g.clear();
          g.fillStyle(C.fuselage);
          g.fillRect(0, 0, TILE, TILE);
          g.fillStyle(C.fuseEdge);
          g.fillRect(0, 0, TILE, 3);
          g.generateTexture("fuse_wall", TILE, TILE);

          // --- Porthole (16×16, drawn centred) ---
          g.clear();
          g.fillStyle(C.fuseEdge);
          g.fillCircle(8, 8, 9);
          g.fillStyle(C.window);
          g.fillCircle(8, 8, 7);
          g.fillStyle(C.windowGlare);
          g.fillCircle(6, 6, 3);
          g.generateTexture("porthole", 16, 16);

          // --- Cabin floor tile (32×32, beige) ---
          g.clear();
          g.fillStyle(C.cabinFloor);
          g.fillRect(0, 0, TILE, TILE);
          g.generateTexture("cabin_floor", TILE, TILE);

          // --- Aisle tile (32×32, grey with centre dash) ---
          g.clear();
          g.fillStyle(C.aisle);
          g.fillRect(0, 0, TILE, TILE);
          g.fillStyle(C.aisleStripe);
          g.fillRect(TILE / 2 - 1, 4, 2, TILE - 8);
          g.generateTexture("aisle_tile", TILE, TILE);

          // --- Seat tile (32×32, navy with highlight) ---
          g.clear();
          g.fillStyle(C.cabinFloor);
          g.fillRect(0, 0, TILE, TILE);
          g.fillStyle(C.seatNavy);
          g.fillRect(3, 2, TILE - 6, TILE - 4);
          g.fillStyle(C.seatHi);
          g.fillRect(3, 2, TILE - 6, 5);
          g.generateTexture("seat_tile", TILE, TILE);

          // --- Column divider (1×96 — 3 seat rows tall) ---
          g.clear();
          g.fillStyle(C.divider);
          g.fillRect(0, 0, 1, TILE * 3);
          g.generateTexture("col_divider", 1, TILE * 3);

          // --- Cockpit fill tile (32×32) ---
          g.clear();
          g.fillStyle(C.cockpitFill);
          g.fillRect(0, 0, TILE, TILE);
          g.generateTexture("cockpit_fill", TILE, TILE);

          // --- Galley fill tile (32×32) ---
          g.clear();
          g.fillStyle(C.galleyFill);
          g.fillRect(0, 0, TILE, TILE);
          g.generateTexture("galley_fill", TILE, TILE);

          // --- Trolley (24×56, silver) ---
          g.clear();
          g.fillStyle(0xcccccc);
          g.fillRect(0, 0, 24, 56);
          g.fillStyle(0xaaaaaa);
          g.fillRect(2, Math.floor(56 / 3), 20, 2);
          g.fillRect(2, Math.floor((56 * 2) / 3), 20, 2);
          g.fillStyle(0x555555); // wheels
          g.fillRect(2, 52, 7, 4);
          g.fillRect(15, 52, 7, 4);
          g.fillStyle(0x999999); // handle (left side)
          g.fillRect(-5, 10, 5, 36);
          g.generateTexture("trolley", 29, 56);

          // Passenger and crew sprites are loaded from /sprites/*.png in preload().

          g.destroy();
        }

        // ---------------------------------------------------------------------------
        // CREATE — place all static scene objects
        // ---------------------------------------------------------------------------
        create() {
          // Background
          this.add.rectangle(CW / 2, CH / 2, CW, CH, C.bg);

          this.drawFuselage();
          this.drawGalley();
          this.drawCabin();
          this.drawCockpit();
          this.drawCrew();
          this.drawLabels();
          this.drawAisleArrow();
        }

        // ---------------------------------------------------------------------------
        // FUSELAGE — left/right walls + top/bottom bands + portholes
        // ---------------------------------------------------------------------------
        drawFuselage() {
          // Left + right fuselage walls for all rows
          for (let r = 0; r < GRID_ROWS; r++) {
            this.add.image(
              tx(TC.fuseLeft) + TILE / 2,
              ty(r) + TILE / 2,
              "fuse_wall",
            );
            this.add.image(
              tx(TC.fuseRight) + TILE / 2,
              ty(r) + TILE / 2,
              "fuse_wall",
            );
          }

          // Top + bottom fuselage walls across full width
          for (let c = 0; c < GRID_COLS; c++) {
            this.add.image(
              tx(c) + TILE / 2,
              ty(TR.fuseTop) + TILE / 2,
              "fuse_wall",
            );
            this.add
              .image(tx(c) + TILE / 2, ty(TR.fuseBot) + TILE / 2, "fuse_wall")
              .setFlipY(true);
          }

          // Portholes — one per cabin row, on both left and right walls
          for (let r = 0; r < CABIN_ROWS; r++) {
            const tileRow = TR.cabin + r;
            const py = ty(tileRow) + TILE / 2;
            this.add.image(tx(TC.fuseLeft) + TILE / 2, py, "porthole");
            this.add.image(tx(TC.fuseRight) + TILE / 2, py, "porthole");
          }
        }

        // ---------------------------------------------------------------------------
        // CABIN — seats + aisle + passengers (rows 1–8)
        // ---------------------------------------------------------------------------
        drawCabin() {
          const seatBg = this.add.graphics();
          seatBg.fillStyle(0x03165c, 1);

          const seatCols = [...SEAT_COLS_LEFT, ...SEAT_COLS_RIGHT];

          for (let r = 0; r < CABIN_ROWS; r++) {
            const tileRow = TR.cabin + r;
            const rowNum = r + 1; // paxMap keys are 1–8

            // Aisle tile (always)
            this.add.image(
              tx(TC.aisle) + TILE / 2,
              ty(tileRow) + TILE / 2,
              "aisle_tile",
            );

            // Seats A–F (0–5) across left then right
            seatCols.forEach((col, seatIdx) => {
              const cx = tx(col) + TILE / 2;
              const cy = ty(tileRow) + TILE / 2;
              const seat = paxMap[rowNum][seatIdx];

              seatBg.fillRect(
                tx(col) + 2,
                ty(tileRow) + 2,
                TILE - 4,
                TILE - 4,
              );
              if (seat.occ) {
                this.add
                  .image(cx, cy, `pax-${seat.v}-south`)
                  .setDisplaySize(TILE - 8, TILE - 8);
              }
            });
          }
        }

        // ---------------------------------------------------------------------------
        // COCKPIT — bottom row (TR.cockpit)
        // ---------------------------------------------------------------------------
        drawCockpit() {
          // Fill cockpit row across cols 1–7
          for (let c = TC.seatA; c <= TC.seatF; c++) {
            this.add.image(
              tx(c) + TILE / 2,
              ty(TR.cockpit) + TILE / 2,
              "cockpit_fill",
            );
          }

          // Door panel (Graphics — drawn over tiles in the cockpit row)
          const g = this.add.graphics();
          const x0 = tx(TC.seatA);
          const y0 = ty(TR.cockpit);
          const w = (TC.seatF - TC.seatA + 1) * TILE;
          const h = TILE;

          // Outer frame (reads as a thicker door surround in one tile)
          g.lineStyle(2, 0x2a4068, 1);
          g.strokeRect(x0 + 2, y0 + 2, w - 4, h - 4);

          g.fillStyle(0x1b2a4a);
          g.fillRect(x0 + 5, y0 + 5, w - 10, h - 10);

          g.lineStyle(1.5, 0x0a1020);
          g.strokeRect(x0 + 7, y0 + 7, w - 14, h - 14);

          // Centre seam
          g.lineStyle(1.5, 0x0a1020);
          g.beginPath();
          g.moveTo(x0 + w / 2, y0 + 9);
          g.lineTo(x0 + w / 2, y0 + h - 9);
          g.strokePath();

          // Handle
          g.fillStyle(0x3a5080);
          g.fillRect(x0 + w - 15, y0 + h / 2 - 5, 6, 10);

          // Portholes on cockpit door
          const doorCx = x0 + w / 2;
          const doorCy = y0 + h / 2;
          this.add
            .image(doorCx - 26, doorCy, "porthole")
            .setScale(1);
          this.add
            .image(doorCx + 26, doorCy, "porthole")
            .setScale(1);

          // COCKPIT label — larger + stroke so it reads on dark blue
          this.add
            .text(x0 + w / 2, y0 + h / 2 + 1, "COCKPIT", {
              fontFamily: '"Press Start 2P"',
              fontSize: "7px",
              color: "#c8e6ff",
              stroke: "#0a1020",
              strokeThickness: 3,
            })
            .setOrigin(0.5, 0.5);
        }

        // ---------------------------------------------------------------------------
        // GALLEY — top row (TR.galley)
        // ---------------------------------------------------------------------------
        drawGalley() {
          // Fill galley row across cols 1–7
          for (let c = TC.seatA; c <= TC.seatF; c++) {
            this.add.image(
              tx(c) + TILE / 2,
              ty(TR.galley) + TILE / 2,
              "galley_fill",
            );
          }

          const g = this.add.graphics();
          const x0 = tx(TC.seatA);
          const y0 = ty(TR.galley);
          const w = (TC.seatF - TC.seatA + 1) * TILE;

          // Upper counter band + lower equipment band (reads clearer in one tile)
          g.fillStyle(0xb8b8b8);
          g.fillRect(x0 + 2, y0 + 2, w - 4, 11);
          g.lineStyle(1, 0x888888, 1);
          g.strokeRect(x0 + 2, y0 + 2, w - 4, 11);

          // Lower galley “bench” / ovens
          g.fillStyle(0x999999);
          g.fillRect(x0 + 4, y0 + 16, w - 8, TILE - 20);
          g.fillStyle(0x888888);
          g.fillRect(x0 + 6, y0 + 19, w - 12, 4);

          // Small indicator lights along the bench
          const lightsY = y0 + 24;
          const step = Math.floor((w - 20) / 6);
          for (let i = 0; i < 6; i++) {
            const lx = x0 + 10 + i * step;
            g.fillStyle(i % 2 === 0 ? 0x00cc44 : 0xffaa00);
            g.fillRect(lx, lightsY, 4, 4);
          }

          // Trolley in the aisle tile of the galley row
          const trolleyX = tx(TC.aisle) + TILE / 2;
          const trolleyY = ty(TR.galley) + TILE / 2;
          this.add.image(trolleyX, trolleyY + 4, "trolley").setOrigin(0.5);

          // GALLEY label — sits on the lower bench band (clear of counter + lights)
          this.add
            .text(x0 + w / 2, y0 + 34, "GALLEY", {
              fontFamily: '"Press Start 2P"',
              fontSize: "7px",
              color: "#1b2a4a",
              stroke: "#e8e8e8",
              strokeThickness: 2,
            })
            .setOrigin(0.5, 0.5);
        }

        // ---------------------------------------------------------------------------
        // CREW — spawns in the top galley aisle (row TR.galley, col TC.aisle)
        // ---------------------------------------------------------------------------
        drawCrew() {
          const cx = tx(TC.aisle) + TILE / 2;
          const cy = ty(TR.galley) + TILE / 2;

          // Standing crew — no seat tile background (unlike seated passengers)

          // Character select sets window.selectedCrew; default / undefined = female.
          this.crewGender =
            window.selectedCrew === "male" ? "male" : "female";
          const prefix =
            this.crewGender === "male" ? "male-crew-" : "female-crew-";
          this.crewTexturePrefix = prefix;

          this.crewDir = "south";
          this.crewSprite = this.add
            .image(cx, cy, `${prefix}south`)
            .setOrigin(0.5, 0.5)
            .setDisplaySize(TILE - 4, TILE - 4);
        }

        // ---------------------------------------------------------------------------
        // LABELS — row numbers (left) + seat letters (top)
        // ---------------------------------------------------------------------------
        drawLabels() {
          const labelStyle = {
            fontFamily: '"Press Start 2P"',
            fontSize: "5px",
            color: "#888888",
          };

          // Row numbers (1–8) to the left of the cabin rows
          const rowLabelX = tx(TC.fuseLeft) - 10;
          for (let r = 0; r < CABIN_ROWS; r++) {
            const tileRow = TR.cabin + r;
            const rowLabel = String(CABIN_ROWS - r);
            this.add
              .text(rowLabelX, ty(tileRow) + TILE / 2, rowLabel, labelStyle)
              .setOrigin(0.5);
          }

          // Seat letters above cabin (F E D | C B A)
          const seatLetters = ["F", "E", "D", "C", "B", "A"];
          const seatCols = [...SEAT_COLS_LEFT, ...SEAT_COLS_RIGHT];
          const seatLabelY = ty(TR.cabin) - 10;
          const seatLetterStyle = {
            ...labelStyle,
            color: "#cccccc",
          };
          seatCols.forEach((col, i) => {
            this.add
              .text(tx(col) + TILE / 2, seatLabelY, seatLetters[i], seatLetterStyle)
              .setOrigin(0.5);
          });
        }

        // ---------------------------------------------------------------------------
        // AISLE ARROW — shows player walks DOWN (toward cockpit)
        // ---------------------------------------------------------------------------
        drawAisleArrow() {
          const midRow = TR.cabin + Math.floor(CABIN_ROWS / 2);
          const ax = tx(TC.aisle) + TILE / 2;
          const ay = ty(midRow) + TILE / 2;

          const g = this.add.graphics();
          g.fillStyle(0x999999);
          g.beginPath();
          // Small pixel arrow pointing downward
          g.moveTo(ax, ay + 12);
          g.lineTo(ax - 6, ay + 2);
          g.lineTo(ax - 2, ay + 2);
          g.lineTo(ax - 2, ay - 10);
          g.lineTo(ax + 2, ay - 10);
          g.lineTo(ax + 2, ay + 2);
          g.lineTo(ax + 6, ay + 2);
          g.closePath();
          g.fillPath();
        }
      }

      // =============================================================================
      // PHASER GAME CONFIG
      // =============================================================================
      const config = {
        type: Phaser.AUTO,
        width: CW,
        height: CH,
        backgroundColor: "#111111",
        pixelArt: true, // disables anti-aliasing — crisp pixel edges
        roundPixels: true, // prevents sub-pixel blurring
        parent: "game-container",
        scene: [CharacterSelectScene, CabinScene],
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
      };

      const game = new Phaser.Game(config);
    </script>
  </body>
</html>
