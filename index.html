<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doors to Manual</title>

    <!-- Jam widget (required for Cursor Vibe Jam 2026) -->
    <script async src="https://vibej.am/2026/widget.js"></script>

    <!-- Pixel font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <!-- Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Press Start 2P", monospace;
      }

      #game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* HUD bars — DOM elements, sit above/below canvas */
      .hud {
        width: 800px;
        background: #1b2a4a;
        font-size: 11px;
        color: #fff;
        padding: 11px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        letter-spacing: 0.05em;
        flex-shrink: 0;
      }
      .hud--top {
        border-bottom: 2px solid #000;
      }
      .hud--bottom {
        border-top: 2px solid #000;
        justify-content: center;
        gap: 40px;
      }
      .hud__armed {
        color: #ff4444;
      }
      .hud__route {
        color: #ffffff;
      }
      .hud__timer {
        color: #ffff44;
      }
      .hud__score {
        color: #00ff7f;
      }
      .hud__phase {
        color: #aaaaaa;
      }

      /* Phaser mounts its canvas here */
      #game-container canvas {
        display: block !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border-left: 3px solid #111;
        border-right: 3px solid #111;
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <header class="hud hud--top">
        <span class="hud__armed">DOORS TO ARMED</span>
        <span class="hud__route">SIN → KUL</span>
        <span class="hud__timer" id="hud-timer">04:00</span>
      </header>

      <div id="game-container"></div>

      <footer class="hud hud--bottom">
        <span class="hud__score" id="hud-score">SCORE: 0</span>
        <span class="hud__phase" id="hud-phase">PHASE: BOARDING</span>
      </footer>
    </div>
    <script src="js/constants.js"></script>
    <script src="js/textures.js"></script>
    <script src="js/scenes/CharacterSelectScene.js"></script>
    <script src="js/scenes/CabinScene.js"></script>
    <script src="js/scenes/WinScene.js"></script>
    <script>
      const config = {
        type: Phaser.AUTO,
        width: CW,
        height: CH,
        backgroundColor: "#111111",
        pixelArt: true, // disables anti-aliasing — crisp pixel edges
        roundPixels: true, // prevents sub-pixel blurring
        parent: "game-container",
        scene: [CharacterSelectScene, CabinScene, WinScene],
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
      };

      const game = new Phaser.Game(config);
    </script>
  </body>
</html>
